[alembic]
# Path to migration scripts
script_location = alembic

# Prepend the project root (cwd) to sys.path so `import app...` works in env.py
# (alembic runs as a script and would otherwise not have the project on the path).
prepend_sys_path = .

# SQLAlchemy URL — overridden by env.py from settings
sqlalchemy.url = postgresql+asyncpg://chronoflow:chronoflow@localhost:5432/chronoflow

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
