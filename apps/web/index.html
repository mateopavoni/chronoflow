<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChronoFlow — Workflow Engine</title>
    <meta name="description" content="Visual DAG-based workflow engine with time-travel debugging" />
    <!-- Set theme before paint to avoid a flash of the wrong mode -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('chronoflow-theme')
          var dark = stored ? stored === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches
          if (dark) document.documentElement.classList.add('dark')
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
