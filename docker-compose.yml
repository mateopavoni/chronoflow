services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chronoflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chronoflow}
      POSTGRES_DB: ${POSTGRES_DB:-chronoflow}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chronoflow}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./apps/api
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-chronoflow}:${POSTGRES_PASSWORD:-chronoflow}@db:5432/${POSTGRES_DB:-chronoflow}
      CORS_ORIGINS: http://localhost:5173,http://localhost:8080
      ENV: dev
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
      args:
        VITE_API_URL: http://localhost:8000
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  pgdata:
